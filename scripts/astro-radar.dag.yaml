# astro-radar — DAG Dagu (à installer sur CT 246). Couche de DÉCLENCHEMENT only :
# le cerveau (diff de versions + scan des surfaces breaking) vit dans le repo du site
# (scripts/astro-radar.mjs). Ici on se contente de pull, lancer, et router le brief.
#
# Prérequis déjà en place : Hermes/Dagu clonent pixelium-site (/root/pixelium-site),
# les feeds Astro sont dans FreshRSS, Hermes a un cron veille-quotidienne.
# → ce DAG ajoute le lane CIBLÉ "upgrade brief" par-dessus l'awareness passive.
#
# À finaliser en session homelab contre les conventions Dagu réelles de CT 246
# (chemins, secret ntfy/Telegram, éventuelle ouverture d'issue Forgejo = Tier 2).

schedule: "30 8 * * *"   # 08h30, après release-watch (8h) ; heures creuses

env:
  - SITE_DIR: /root/pixelium-site

steps:
  - name: pull-site
    command: bash -c "cd $SITE_DIR && git pull --quiet --ff-only"

  - name: radar
    command: bash -c "cd $SITE_DIR && node scripts/astro-radar.mjs --json"
    output: RADAR_JSON
    continueOn:
      exitCode: [0, 10]   # 10 = il y a du neuf, ce n'est pas une erreur

  - name: route-brief
    depends:
      - radar
    # Ne notifier QUE s'il y a quelque chose à faire (shouldAlert).
    preconditions:
      - condition: "echo '${RADAR_JSON}' | jq -r .shouldAlert"
        expected: "true"
    # Le --json du step radar porte déjà tout : .brief (markdown) et .issue
    # (spec prête à ouvrir : title/labels/body). Pas besoin de relancer le script.
    command: bash -c '
      JSON="${RADAR_JSON}";
      # 1) ping humain (ntfy ; ou router vers Telegram via Hermes)
      echo "$JSON" | jq -r .brief | ntfy publish --title "Astro radar" pixelium-veille;
      # 2) Tier 2 — ouvrir l_issue Forgejo (canal fiable cross-host que la session
      #    web relit via le label astro-upgrade). Idempotence : ne pas ré-ouvrir si une
      #    issue ouverte avec le même titre existe déjà.
      TITLE=$(echo "$JSON" | jq -r .issue.title);
      BODY=$(echo "$JSON" | jq -r .issue.body);
      EXISTS=$(curl -s -H "Authorization: token $FORGEJO_TOKEN" \
        "$FORGEJO_URL/api/v1/repos/uzer/pixelium-site/issues?state=open&type=issues" \
        | jq -r --arg t "$TITLE" "map(select(.title==\$t)) | length");
      if [ "$EXISTS" = "0" ]; then
        echo "$JSON" | jq "{title: .issue.title, body: .issue.body, labels: []}" \
          | curl -s -X POST -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" -d @- \
            "$FORGEJO_URL/api/v1/repos/uzer/pixelium-site/issues" > /dev/null;
      fi;
    '
    # NB labels : l_API Forgejo veut des IDs de label, pas des noms — la session homelab
    # résout astro-upgrade/dependencies en IDs (les créer une fois sur le repo) puis les
    # passe dans le POST. Laissé vide ici volontairement.
