name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  # Rebuild quotidien : re-fetch toutes les données build-time (HTB, Root-Me,
  # statuts PR /contributions) → chaque page se rafraîchit seule, sans commit.
  schedule:
    - cron: '0 5 * * *' # 05:00 UTC daily (avant le Freshness guard de 06:17)
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build
        env:
          HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
          ROOTME_API_KEY: ${{ secrets.ROOTME_API_KEY }}
          ROOTME_UID: ${{ secrets.ROOTME_UID }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          # /contributions : synchro statut des PR au build (lecture publique GitHub).
          # GITHUB_TOKEN auto-fourni par Actions — évite le rate-limit anonyme (60/h).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # @astrojs/cloudflare v14 scinde la sortie en dist/client (assets) +
        # dist/server (worker) et génère dist/server/wrangler.json (bindings
        # fusionnés depuis wrangler.toml + chemins résolus). On déploie cette
        # config générée — un `wrangler deploy` nu lirait le wrangler.toml racine
        # (./dist, sans main) et publierait les assets sans le Worker SSR.
      - run: npx wrangler deploy -c dist/server/wrangler.json
        env:
          # F-003 #97 (fait 2026-06-07) : token scopé `pixelium-site-ci` —
          # Workers Scripts/KV/D1 Write + Workers AI Read + Account Settings Read
          # + User Details/Memberships Read. Validé en dry-run avant bascule.
          # Rollback : remettre CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL (secrets conservés).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify Telegram on failure
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=Markdown \
            -d text="⚠️ *Deploy pixelium.win FAILED*%0A%0ACommit: \`${GITHUB_SHA::7}\`%0AMessage: ${COMMIT_MSG}%0A[Voir le run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
